# .github/workflows/compile-pr.yml
name: Compile PR in Container

on:
  pull_request:
    branches: [main]  # Or your target branch

jobs:
  get_tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_sha.outputs.tag }}
    steps:
      - name: Get latest SHA from scarab-infra
        id: get_sha
        run: |
          LATEST_SHA=$(curl -s https://api.github.com/repos/litz-lab/scarab-infra/commits/main | jq -r '.sha')
          SHORT_SHA=$(echo "$LATEST_SHA" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT

  build-opt:
    runs-on: ubuntu-latest
    needs: get_tag
    container:
      image: ghcr.io/litz-lab/scarab-infra/allbench_traces:${{ needs.get_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mark Git repo as safe
        run: git config --global --add safe.directory /__w/scarab_ll/scarab_ll

      - name: Build Scarab Opt
        working-directory: src
        run: make opt -j

      - name: Upload Scarab dir
        uses: actions/upload-artifact@v4
        with:
          name: scarab-dir
          path: ./

      #- name: Upload PARAMS.file
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: params-file
      #    path: src/PARAMS.sunny_cove

  run-scarab:
    runs-on: ubuntu-latest
    needs: [get_tag, build-opt]
    steps:

      - name: Clone scarab-infra repo via SSH
        run: git clone https://github.com/litz-lab/scarab-infra.git

      - name: Pull Scarab Docker image
        run: docker pull ghcr.io/litz-lab/scarab-infra/allbench_traces:${{ needs.get_tag.outputs.tag }}

      - name: Download Scarab dir
        uses: actions/download-artifact@v4
        with:
          name: scarab-dir
          path: ./scarab_ll/

      #- name: Download PARAMS.file
      #  uses: actions/download-artifact@v4
      #  with:
      #    name: params-file
      #    path: ./scarab_ll/src

      - name: Run Scarab simulation
        working-directory: scarab-infra
        run: |
          set -e #force workflow to fail on script error
          curl -L -o traces_top_simpoint.tar.gz https://github.com/litz-lab/scarab-infra/releases/download/top_simpoint_perlbench/traces_top_simpoint.tar.gz
          tar -xzf traces_top_simpoint.tar.gz
          mv ./traces_top_simpoint/top_simpoint.json ./json/top_simpoint.json
          chmod +x run.sh
          #ln -s ../scarab_ll/src/build/opt/scarab ../scarab_ll/src/scarab
          pip install docker
          pip install psutil
          ls -alt /home/runner/work/scarab_ll/scarab_ll/scarab_ll/
          ls -alt ../scarab_ll/
          ./run.sh --simulation top_simpoint

      - name: Upload perf data
        uses: actions/upload-artifact@v4
        with:
          name: last-perf-data
          path: .//simulations/exp6/baseline/mongodb/4118



  build-dbg:
    runs-on: ubuntu-latest
    needs: get_tag
    if: github.event_name == 'pull_request'
    container:
      image: ghcr.io/litz-lab/scarab-infra/allbench_traces:${{ needs.get_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mark Git repo as safe
        run: git config --global --add safe.directory /__w/scarab_ll/scarab_ll

      - name: Build Scarab Dbg
        working-directory: src
        run: make dbg -j

  upload-perf-data:
    runs-on: ubuntu-latest
    needs: [get_tag, build-opt, run-scarab]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download perf data
        uses: actions/download-artifact@v4
        with:
          name: last-perf-data
          path: ./

      - name: Download existing performance log
        run: gh release download perf-data --pattern "performance_log.csv" --dir .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append new result
        run: |
          echo "${{ github.sha }},$(cat perf.txt),$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> performance_log.csv

      - name: Delete old asset
        run: |
          ASSET_ID=$(gh api repos/${{ github.repository }}/releases/tags/perf-data | jq '.assets[] | select(.name == "performance_log.csv") | .id')
          if [ -n "$ASSET_ID" ]; then
            gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updated CSV
        run: gh release upload perf-data performance_log.csv --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
