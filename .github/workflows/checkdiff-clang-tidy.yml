name: Clang Tidy Check

# Enforces that every member variable in the codebase is either initialized at
# declaration or in the constructor's member initializer list. We run the
# check across the whole src/ tree (not just the PR diff) so that a change in
# a header is still caught by the warning that fires on the corresponding
# constructor in a .cc file that wasn't touched by the PR.

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-tidy and GCC 13 C++ headers
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy g++-13 libstdc++-13-dev

      - name: Run clang-tidy across src/
        working-directory: src
        run: |
          set -o pipefail

          # All C++ translation units under src/ except:
          #   - deps/       (vendored third-party)
          #   - ramulator/  (vendored memory simulator)
          #   - pin/        (compiled with PIN's custom toolchain, not GCC)
          #   - build/      (generated)
          # .c files are intentionally excluded: the cppcoreguidelines-*
          # checks are C++-only and parsing C as C++ produces spurious errors.
          mapfile -t FILES < <(find . -type f \( -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' \) \
                                 -not -path './deps/*' \
                                 -not -path './ramulator/*' \
                                 -not -path './pin/*' \
                                 -not -path './build/*' \
                               | sort)

          echo "Running clang-tidy on ${#FILES[@]} translation units..."

          LOG=clang-tidy-output.log
          : > "$LOG"

          # Parallelize across available cores. We intentionally do NOT pass
          # -warnings-as-errors so every file is processed; we grep the full
          # log at the end and fail the job if the member-init check fired.
          printf '%s\n' "${FILES[@]}" \
            | xargs -P "$(nproc)" -I{} -n 1 \
                clang-tidy \
                  -quiet \
                  -checks='-*,cppcoreguidelines-pro-type-member-init' \
                  -header-filter='.*' \
                  {} -- -std=c++17 -I. -DLINUX -DX86_64 -DNO_DEBUG \
                  -isystem /usr/include/c++/13 \
                  -isystem /usr/include/x86_64-linux-gnu/c++/13 \
                  -isystem /usr/include/c++/13/backward \
                  -isystem /usr/lib/gcc/x86_64-linux-gnu/13/include \
              2>&1 | tee -a "$LOG" || true

          # A diagnostic from the enabled check looks like:
          #   path/to/file.cc:42:7: warning: constructor does not initialize
          #     these fields: [cppcoreguidelines-pro-type-member-init]
          # We also drop hits from vendored trees, which can sneak in via
          # transitive includes even though we don't lint them directly.
          FINDINGS=$(grep -E '(warning|error):.*\[cppcoreguidelines-pro-type-member-init\]' "$LOG" \
                       | grep -vE '/(deps|ramulator|pin)/' \
                       | sort -u)

          if [ -n "$FINDINGS" ]; then
            echo "::error::clang-tidy found uninitialized members."
            echo "$FINDINGS"
            {
              echo "## clang-tidy findings (cppcoreguidelines-pro-type-member-init)"
              echo
              echo '```'
              echo "$FINDINGS"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "clang-tidy clean."

      - name: Post a comment on the PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                "⚠️ **clang-tidy check FAILED** (`cppcoreguidelines-pro-type-member-init`).",
                "",
                "Every member variable must be initialized either at declaration (e.g. `int x = 0;`, `std::vector<T> v = {};`, `Foo f = {};`) or in the constructor's *member initializer list*. Assigning in the constructor body does **not** count, nor does `memset`.",
                "",
                "Reproduce locally:",
                "```bash",
                "clang-tidy -checks='-*,cppcoreguidelines-pro-type-member-init' -header-filter='.*' \\",
                "  src/<your_file>.cc -- -std=c++17 -I src -DLINUX -DX86_64 -DNO_DEBUG \\",
                "  -isystem /usr/include/c++/13 \\",
                "  -isystem /usr/include/x86_64-linux-gnu/c++/13 \\",
                "  -isystem /usr/include/c++/13/backward \\",
                "  -isystem /usr/lib/gcc/x86_64-linux-gnu/13/include",
                "```",
                "",
                "See the workflow run's job summary for the full list of findings."
              ].join("\n")
            });
